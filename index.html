<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="Calculadora">
        <h1>Calculadora de propinas</h1>

        <label for="cuenta">Total de cuenta (Q):</label>
        <input type="number" id="cuenta" placeholder="Ej: 100" min="0">

        <label for="porcentaje">Porcentaje de propina:</label>
        <select id="porcentaje">
            <option value="20">20%</option>
            <option value="10">10%</option>
            <option value="15">15%</option>
            <option value="25">25%</option>
        </select>

        <label for="personas">Número de personas:</label>
        <input type="number" id="personas" placeholder="Ej: 4" min="1" value="1">

        <button onclick="calcular()">Jefferson</button>

        <div class="resultado" id="resultado" s tyle="display: none;">
            <p>Propina: <span id="propina"></span></p>
            <p>Total a pagar: <span id="total"></span></p>
            <p class="total">Por persona: <span id="porPersona"></span></p>
        </div>
    </div>

    <script src="java/script.js"></script>
</body>
</html>
